{% extends "base.html" %}

{% block content %}

<h2>🚓 Create Patrol</h2>

<input id="date" placeholder="Date">
<br><br>
<input id="time" placeholder="Time">
<br><br>

<button onclick="create()">Create Patrol</button>

<script>
function create() {
    fetch("/api/patrol/create", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            date: date.value,
            time: time.value
        })
    })
}
</script>

{% endblock %}
