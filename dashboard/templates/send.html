{% extends "base.html" %}

{% block content %}

<h2>💬 Send Message</h2>

<input id="channel" placeholder="Channel ID">
<br><br>

<textarea id="message" placeholder="Message"></textarea>
<br><br>

<button onclick="send()">Send</button>

<script>
function send() {
    fetch("/api/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            channel: channel.value,
            message: message.value
        })
    })
}
</script>

{% endblock %}
