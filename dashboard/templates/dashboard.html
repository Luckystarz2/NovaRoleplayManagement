{% extends "base.html" %}
{% block content %}

<style>
.card {
    background: rgba(30, 31, 36, 0.9);
    padding: 20px;
    border-radius: 18px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: none;
    background: #2a2c33;
    color: white;
}

button {
    padding: 12px 16px;
    border: none;
    border-radius: 12px;
    background: #5865F2;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #4752c4;
}

.status-msg {
    margin-top: 10px;
    font-size: 14px;
}

.success { color: #3ba55d; }
.error { color: #ed4245; }
</style>

<h1>📊 Nova Dashboard</h1>

<script>
const API_URL = "https://your-railway-app.up.railway.app"; 
// 🔥 CHANGE THIS

// ----------------------------
// SAFE FETCH WRAPPER
// ----------------------------
async function safeFetch(url, options) {
    try {
        const res = await fetch(url, options);
        const text = await res.text(); // always read as text first

        try {
            return JSON.parse(text); // try JSON
        } catch (e) {
            return { success: false, error: text }; // fallback HTML/error
        }

    } catch (err) {
        return { success: false, error: err.message };
    }
}

// ----------------------------
function showResult(id, data) {
    const el = document.getElementById(id);

    if (data && data.success) {
        el.innerHTML = "✅ Success!";
        el.className = "status-msg success";
    } else {
        el.innerHTML = "❌ Error: " + (data.error || "Unknown");
        el.className = "status-msg error";
    }
}

// ----------------------------
// STATUS
// ----------------------------
async function updateStatus() {
    const data = await safeFetch(API_URL + "/set-status", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            text: document.getElementById("text").value,
            type: document.getElementById("type").value
        })
    });

    showResult("statusResult", data);
}

// ----------------------------
// PATROL
// ----------------------------
async function sendPatrol() {
    const data = await safeFetch(API_URL + "/patrol", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            date: document.getElementById("date").value,
            time: document.getElementById("time").value,
            channel_id: document.getElementById("channel").value
        })
    });

    showResult("patrolResult", data);
}

// ----------------------------
// SEND MESSAGE
// ----------------------------
async function sendMessage() {
    const data = await safeFetch(API_URL + "/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            channel: document.getElementById("msgChannel").value,
            message: document.getElementById("message").value
        })
    });

    showResult("messageResult", data);
}
</script>

<!-- STATUS -->
<div class="card">
    <h3>Bot Status</h3>

    <input id="text" placeholder="Status text">

    <select id="type">
        <option value="playing">Playing</option>
        <option value="watching">Watching</option>
        <option value="listening">Listening</option>
    </select>

    <button onclick="updateStatus()">Update Status</button>

    <div id="statusResult" class="status-msg"></div>
</div>

<!-- PATROL -->
<div class="card">
    <h3>🚓 Patrol Announcement</h3>

    <input id="date" placeholder="Date">
    <input id="time" placeholder="Time">
    <input id="channel" placeholder="Channel ID">

    <button onclick="sendPatrol()">Send Patrol</button>

    <div id="patrolResult" class="status-msg"></div>
</div>

<!-- SEND -->
<div class="card">
    <h3>💬 Send Message</h3>

    <input id="msgChannel" placeholder="Channel ID">
    <textarea id="message" placeholder="Message"></textarea>

    <button onclick="sendMessage()">Send</button>

    <div id="messageResult" class="status-msg"></div>
</div>

{% endblock %}
