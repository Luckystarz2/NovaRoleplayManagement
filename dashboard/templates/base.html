<!DOCTYPE html>
<html lang="en">
<head>

    <title>Nova Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->

        <a href="/" class="nav-item">📊 Dashboard</a>

    <!-- MAIN CONTENT -->
    <div class="main">

</div>

</body>
</html>
